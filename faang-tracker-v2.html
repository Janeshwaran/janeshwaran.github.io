<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAANG Frontend Roadmap Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3; --surface: #ffffff; --surface2: #f3f2ef;
  --border: #e8e5de; --border2: #d6d3ca;
  --text: #1c1917; --muted: #78716c; --faint: #a8a29e;
  --p1: #16a34a; --p1l: #dcfce7; --p1d: #14532d;
  --p2: #2563eb; --p2l: #dbeafe; --p2d: #1e3a8a;
  --p3: #d97706; --p3l: #fef3c7; --p3d: #78350f;
  --p4: #7c3aed; --p4l: #ede9fe; --p4d: #3b0764;
  --p5: #dc2626; --p5l: #fee2e2; --p5d: #7f1d1d;
  --accent: #2563eb;
  --radius: 10px; --sidebar: 268px;
  --checked-bg: #f9f8f6;
  --modal-overlay: rgba(0,0,0,0.45);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #111110; --surface: #1c1c1a; --surface2: #232320;
  --border: #2e2e2b; --border2: #3a3a36;
  --text: #e8e6e1; --muted: #8c8a85; --faint: #5c5a56;
  --p1: #22c55e; --p1l: #14532d; --p1d: #bbf7d0;
  --p2: #3b82f6; --p2l: #1e3a8a; --p2d: #bfdbfe;
  --p3: #f59e0b; --p3l: #78350f; --p3d: #fde68a;
  --p4: #a855f7; --p4l: #3b0764; --p4d: #e9d5ff;
  --p5: #ef4444; --p5l: #7f1d1d; --p5d: #fecaca;
  --accent: #3b82f6;
  --checked-bg: #181817;
  --modal-overlay: rgba(0,0,0,0.7);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; transition: background .2s, color .2s; }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar); height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
}
.sidebar-head {
  padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.sidebar-logo { font-size: 14px; font-weight: 700; letter-spacing: -.3px; }
.sidebar-sub { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
.overall-progress { }
.op-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.op-bar { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
.op-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }

/* sidebar toolbar */
.sidebar-toolbar {
  display: flex; gap: 5px; padding: 8px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stb-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 5px 4px; border: 1px solid var(--border); border-radius: 7px;
  background: transparent; cursor: pointer; font-family: 'Outfit', sans-serif;
  font-size: 10px; font-weight: 500; color: var(--muted); transition: all .15s;
}
.stb-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.stb-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* dark toggle */
.dark-toggle {
  width: 34px; height: 18px; border-radius: 9px; background: var(--border);
  border: 1px solid var(--border2); cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0;
  display: flex; align-items: center; padding: 2px;
}
.dark-toggle.on { background: var(--accent); border-color: var(--accent); }
.dark-toggle-knob {
  width: 12px; height: 12px; border-radius: 50%; background: #fff;
  transition: transform .2s; display: flex; align-items: center; justify-content: center;
  font-size: 7px; line-height: 1;
}
.dark-toggle.on .dark-toggle-knob { transform: translateX(16px); }

/* scrollable week list */
#sidebar-weeks { overflow-y: auto; flex: 1; }
#sidebar-weeks::-webkit-scrollbar { width: 4px; }
#sidebar-weeks::-webkit-scrollbar-track { background: transparent; }
#sidebar-weeks::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.phase-group { border-bottom: 1px solid var(--border); }
.phase-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; padding: 10px 16px 4px; color: var(--faint); }
.week-item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; cursor: pointer; transition: background .12s; }
.week-item:hover { background: var(--surface2); }
.week-item.active { background: var(--text); }
.week-item.active .week-num, .week-item.active .week-name, .week-item.active .week-pct { color: var(--bg) !important; }
.week-num { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--faint); width: 20px; flex-shrink: 0; }
.week-name { font-size: 11px; font-weight: 500; flex: 1; line-height: 1.3; color: var(--text); }
.week-pct { font-size: 9px; color: var(--faint); font-family: 'JetBrains Mono', monospace; }
.week-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--border); transition: background .3s; }

/* ── MAIN ── */
#main { margin-left: var(--sidebar); flex: 1; padding: 28px 36px 72px; max-width: calc(100vw - var(--sidebar)); }

/* STATS BAR */
.stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.stat-val { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* WEEK HEADER */
.week-header { margin-bottom: 20px; }
.week-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
.wh-left h1 { font-size: 20px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 3px; }
.wh-left p { font-size: 12px; color: var(--muted); line-height: 1.55; max-width: 560px; }
.phase-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
.week-prog-row { display: flex; align-items: center; gap: 10px; }
.week-prog-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; max-width: 280px; }
.week-prog-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.week-prog-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.clear-week-btn { font-size: 10px; padding: 3px 9px; border: 1px solid var(--border); border-radius: 6px; background: transparent; cursor: pointer; color: var(--muted); font-family: 'Outfit', sans-serif; transition: all .15s; }
.clear-week-btn:hover { background: var(--surface2); color: var(--text); }

/* SECTIONS */
.section { margin-bottom: 16px; }
.section-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; cursor: pointer; user-select: none; transition: background .12s; }
.section-head:hover { background: var(--surface2); }
.section-icon { font-size: 13px; }
.section-title { font-size: 12px; font-weight: 600; flex: 1; }
.section-meta { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.section-chevron { font-size: 9px; color: var(--faint); transition: transform .2s; }
.section-chevron.open { transform: rotate(90deg); }
.section-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; background: var(--surface); }
.section-body.collapsed { display: none; }

/* TASKS */
.task-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); transition: background .1s; }
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: var(--surface2); }
.task-item.checked { background: var(--checked-bg); }
.task-cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; cursor: pointer; }
.task-item.checked .task-cb { background: var(--text); border-color: var(--text); }
.task-item.checked .task-cb::after { content: '✓'; color: var(--bg); font-size: 10px; font-weight: 700; }
.task-content { flex: 1; min-width: 0; cursor: pointer; }
.task-title { font-size: 12px; line-height: 1.45; font-weight: 500; }
.task-item.checked .task-title { color: var(--muted); text-decoration: line-through; }
.task-desc { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.45; }
.task-resource-btn {
  flex-shrink: 0; margin-top: 1px; width: 24px; height: 24px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
  color: var(--muted);
}
.task-resource-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.task-resource-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* NAV */
.week-nav { display: flex; gap: 10px; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); }
.nav-btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); transition: all .15s; }
.nav-btn:hover { background: var(--surface2); }
.nav-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.nav-btn.primary:hover { opacity: .85; }
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: var(--modal-overlay);
  z-index: 999; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  width: 100%; max-width: 540px; max-height: 88vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow); animation: modalIn .18s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }
.modal-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.modal-title { font-size: 14px; font-weight: 700; line-height: 1.35; flex: 1; }
.modal-close { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--muted); font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .12s; }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-desc { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 6px; }
.modal-body { overflow-y: auto; flex: 1; padding: 14px 18px 18px; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.modal-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--faint); margin-bottom: 8px; margin-top: 16px; }
.modal-section-title:first-child { margin-top: 0; }
.resource-link {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 9px; text-decoration: none; color: var(--text); background: var(--surface2);
  margin-bottom: 7px; transition: all .15s;
}
.resource-link:hover { border-color: var(--accent); background: var(--surface); }
.resource-link:hover .rl-icon { background: var(--accent); color: #fff; }
.rl-icon { width: 32px; height: 32px; border-radius: 7px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: all .15s; }
.rl-body { flex: 1; min-width: 0; }
.rl-name { font-size: 12px; font-weight: 600; margin-bottom: 1px; }
.rl-desc { font-size: 10px; color: var(--muted); line-height: 1.4; }
.rl-badge { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
.rl-badge.free { background: var(--p1l); color: var(--p1d); }
.rl-badge.paid { background: var(--p3l); color: var(--p3d); }
.rl-badge.must { background: var(--p5l); color: var(--p5d); }
.practice-item { padding: 8px 12px; border: 1px solid var(--border); border-radius: 9px; margin-bottom: 7px; background: var(--surface2); }
.practice-item code { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--border); padding: 1px 5px; border-radius: 4px; color: var(--text); }
.practice-item p { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.tip-box { padding: 10px 12px; background: var(--p3l); border-left: 3px solid var(--p3); border-radius: 0 8px 8px 0; margin-top: 4px; }
.tip-box p { font-size: 11px; color: var(--p3d); line-height: 1.5; }
[data-theme="dark"] .tip-box { background: #2a1f0a; }
[data-theme="dark"] .tip-box p { color: var(--p3d); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; right: 24px; z-index: 1100; display: flex; flex-direction: column; gap: 8px; }
.toast-item { background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 9px; font-size: 12px; font-weight: 500; box-shadow: var(--shadow); animation: toastIn .2s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

@media (max-width: 768px) {
  :root { --sidebar: 0px; }
  #sidebar { display: none; }
  #main { margin-left: 0; padding: 16px 14px 56px; }
  .stats-bar { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo-row">
      <div class="sidebar-logo">FAANG Frontend</div>
      <button class="dark-toggle" id="darkToggle" title="Toggle dark mode" onclick="toggleDark()">
        <div class="dark-toggle-knob" id="darkKnob">☀</div>
      </button>
    </div>
    <div class="sidebar-sub">Interview Tracker · 16 weeks</div>
    <div class="overall-progress">
      <div class="op-label"><span>Overall progress</span><span id="overall-pct">0%</span></div>
      <div class="op-bar"><div class="op-fill" id="overall-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="sidebar-toolbar">
    <button class="stb-btn" onclick="exportProgress()" title="Export progress">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button class="stb-btn" onclick="document.getElementById('importFile').click()" title="Load progress">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Load
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(event)">
  </div>
  <div id="sidebar-weeks"></div>
</nav>

<!-- MAIN -->
<main id="main">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Tasks Done</div><div class="stat-val" id="stat-done">0</div><div class="stat-sub" id="stat-total-sub">of 0 total</div></div>
    <div class="stat-card"><div class="stat-label">Current Week</div><div class="stat-val" id="stat-week">W1</div><div class="stat-sub" id="stat-phase">Phase 1 · Foundations</div></div>
    <div class="stat-card"><div class="stat-label">Weeks Complete</div><div class="stat-val" id="stat-weeks-done">0</div><div class="stat-sub">of 16 weeks</div></div>
    <div class="stat-card"><div class="stat-label">Completion</div><div class="stat-val" id="stat-pct">0%</div><div class="stat-sub" id="stat-motivate">keep going!</div></div>
  </div>
  <div id="week-content"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// DATA — WEEKS WITH RESOURCES
// ═══════════════════════════════════════════════
const PHASES = [
  { id:1, name:'Phase 1 — JS Foundations', color:'var(--p1)', light:'var(--p1l)', dark:'var(--p1d)', weeks:[1,2,3,4] },
  { id:2, name:'Phase 2 — React Mastery',  color:'var(--p2)', light:'var(--p2l)', dark:'var(--p2d)', weeks:[5,6,7,8] },
  { id:3, name:'Phase 3 — System Design',  color:'var(--p4)', light:'var(--p4l)', dark:'var(--p4d)', weeks:[9,10] },
  { id:4, name:'Phase 4 — Interview Prep', color:'var(--p5)', light:'var(--p5l)', dark:'var(--p5d)', weeks:[11,12,13,14] },
  { id:5, name:'Phase 5 — Final Sprint',   color:'var(--p3)', light:'var(--p3l)', dark:'var(--p3d)', weeks:[15,16] }
];

// Resources keyed by task id
const TASK_RESOURCES = {
  'w1-t1': {
    links:[
      { icon:'📖', name:'javascript.info — Variable Scope & Closure', url:'https://javascript.info/closure', desc:'Best free resource. Read "Variable scope" + "Closure" chapters.', badge:'free' },
      { icon:'📘', name:'YDKJS — Scope & Closures (Ch 1–2)', url:'https://github.com/getify/You-Dont-Know-JS/tree/2nd-ed/scope-closures', desc:'Free on GitHub. Deepest treatment of JS scope available.', badge:'free' },
      { icon:'🎥', name:'Codesmith — JS the Hard Parts: Closure', url:'https://www.youtube.com/watch?v=aHrvi2zTlaU', desc:'Visual walkthrough of execution context and scope chain.', badge:'free' },
    ],
    practice:[
      { code:'console.log(typeof x); var x = 5;', hint:'What does hoisting do to var declarations?' },
      { code:'function outer(){\n  let a=1;\n  function inner(){ console.log(a); }\n  inner();\n}\nouter();', hint:'Trace the scope chain from inner() outward.' }
    ],
    tip:'Draw the call stack and scope chain on paper as you trace. Writing > reading for retention.'
  },
  'w1-t2': {
    links:[
      { icon:'📖', name:'javascript.info — Variable Scope', url:'https://javascript.info/var', desc:'The "var" article covers hoisting in perfect detail.', badge:'free' },
      { icon:'🔬', name:'MDN — Hoisting', url:'https://developer.mozilla.org/en-US/docs/Glossary/Hoisting', desc:'MDN reference with examples of var vs function vs let/const TDZ.', badge:'free' },
    ],
    practice:[
      { code:'greet();\nfunction greet(){ console.log("hi"); }\nsayHi();\nvar sayHi = () => console.log("hey");', hint:'Function declarations are fully hoisted; var declarations are hoisted but not initialised.' },
    ],
    tip:'Temporal Dead Zone (TDZ) is the most commonly misunderstood part. let/const ARE hoisted — they just cannot be accessed before declaration.'
  },
  'w1-t3': {
    links:[
      { icon:'📖', name:'javascript.info — Closure', url:'https://javascript.info/closure', desc:'Full closure chapter. The loop example is essential reading.', badge:'free' },
      { icon:'📘', name:'YDKJS — Scope & Closures Ch 3', url:'https://github.com/getify/You-Dont-Know-JS/blob/2nd-ed/scope-closures/ch3.md', desc:'The closure chapter from YDKJS 2nd edition.', badge:'free' },
      { icon:'📄', name:'MDN — Closures', url:'https://developer.mozilla.org/en-US/docs/Web/JavaScript/Closures', desc:'MDN has excellent "practical closures" examples.', badge:'free' },
    ],
    practice:[
      { code:'for(var i=0;i<3;i++){\n  setTimeout(()=>console.log(i),100);\n}', hint:'Classic closure bug. Try 3 fixes: var+IIFE, let, separate function.' },
    ],
    tip:'The interview answer to "what is a closure" = "a function that retains access to its outer scope even after the outer function has returned."'
  },
  'w1-e1': {
    links:[
      { icon:'🔥', name:'bigfrontend.dev — Implement memoize', url:'https://bigfrontend.dev/problem/implement-memoize-0', desc:'Exact interview-style problem. Solve before looking at solutions.', badge:'must' },
      { icon:'📖', name:'javascript.info — Decorators & forwarding', url:'https://javascript.info/call-apply-decorators', desc:'Covers the memoize/cache decorator pattern in JS.', badge:'free' },
    ],
    practice:[
      { code:'function memoize(fn) {\n  const cache = new Map();\n  return function(...args) {\n    const key = JSON.stringify(args);\n    if(cache.has(key)) return cache.get(key);\n    const result = fn.apply(this, args);\n    cache.set(key, result);\n    return result;\n  };\n}', hint:'Key challenge: how do you handle object arguments? JSON.stringify works but has edge cases.' },
    ],
    tip:'Follow-up question: "What if an argument is a function or circular object?" Answer: use WeakMap keyed by the first arg, or accept limitations of JSON.stringify.'
  },

// STATE & STORAGE
// ═══════════════════════════════════════════════
let currentWeek = 1;
let darkMode = localStorage.getItem('darkMode') === '1';

function applyTheme() {
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  const toggle = document.getElementById('darkToggle');
  const knob = document.getElementById('darkKnob');
  if (toggle) toggle.classList.toggle('on', darkMode);
  if (knob) knob.textContent = darkMode ? '☽' : '☀';
}

function toggleDark() {
  darkMode = !darkMode;
  localStorage.setItem('darkMode', darkMode ? '1' : '0');
  applyTheme();
}

function getChecked(id) { return localStorage.getItem('task_' + id) === '1'; }
function setChecked(id, val) { val ? localStorage.setItem('task_' + id, '1') : localStorage.removeItem('task_' + id); }

function getPhaseForWeek(wid) { return PHASES.find(p => p.weeks.includes(wid)); }
function allTaskIds() {
  let ids = [];
  WEEKS.forEach(w => w.sections.forEach(s => s.tasks.forEach(t => ids.push(t.id))));
  return ids;
}

function weekProgress(wid) {
  const week = WEEKS.find(w => w.id === wid);
  let total = 0, done = 0;
  week.sections.forEach(s => s.tasks.forEach(t => { total++; if (getChecked(t.id)) done++; }));
  return { total, done, pct: total > 0 ? Math.round(done / total * 100) : 0 };
}

function totalProgress() {
  const ids = allTaskIds();
  const done = ids.filter(id => getChecked(id)).length;
  return { total: ids.length, done, pct: Math.round(done / ids.length * 100) };
}

function weeksDone() { return WEEKS.filter(w => weekProgress(w.id).pct === 100).length; }

// ═══════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════
function exportProgress() {
  const data = {};
  allTaskIds().forEach(id => { if (getChecked(id)) data[id] = 1; });
  data.__darkMode = darkMode ? 1 : 0;
  data.__exportDate = new Date().toISOString();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'faang-progress-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Progress exported!');
}

function importProgress(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      allTaskIds().forEach(id => setChecked(id, data[id] === 1));
      if (data.__darkMode !== undefined) { darkMode = data.__darkMode === 1; localStorage.setItem('darkMode', darkMode ? '1' : '0'); applyTheme(); }
      renderSidebar(); renderWeek(currentWeek); updateStats();
      showToast('Progress loaded! 🎉');
    } catch(err) { showToast('Invalid file. Please use an exported JSON.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item'; el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2200);
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openModal(taskId) {
  const taskData = findTask(taskId);
  const res = TASK_RESOURCES[taskId];
  document.getElementById('modal-title').textContent = taskData ? taskData.title : 'Resources';
  document.getElementById('modal-desc').textContent = taskData ? taskData.desc : '';
  const body = document.getElementById('modal-body');
  if (!res) {
    body.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">No specific resources added yet for this task. Use the general search tip below.</p><div class="tip-box" style="margin-top:12px"><p>💡 Search "<strong>' + (taskData ? taskData.title : '') + ' tutorial site:javascript.info OR site:mdn OR site:web.dev</strong>" for the best results.</p></div>';
  } else {
    let html = '';
    if (res.links && res.links.length) {
      html += '<div class="modal-section-title">Learning Resources</div>';
      res.links.forEach(l => {
        const badgeHtml = l.badge ? `<span class="rl-badge ${l.badge}">${l.badge === 'must' ? '⚑ must' : l.badge}</span>` : '';
        html += `<a href="${l.url}" target="_blank" rel="noopener" class="resource-link">
          <div class="rl-icon">${l.icon}</div>
          <div class="rl-body">
            <div class="rl-name">${l.name}</div>
            <div class="rl-desc">${l.desc}</div>
          </div>
          ${badgeHtml}
        </a>`;
      });
    }
    if (res.practice && res.practice.length) {
      html += '<div class="modal-section-title">Practice Exercises</div>';
      res.practice.forEach(p => {
        html += `<div class="practice-item"><code>${escHtml(p.code)}</code><p>${p.hint}</p></div>`;
      });
    }
    if (res.tip) {
      html += `<div class="tip-box" style="margin-top:12px"><p>💡 ${res.tip}</p></div>`;
    }
    body.innerHTML = html;
  }
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function findTask(taskId) {
  for (const w of WEEKS) for (const s of w.sections) for (const t of s.tasks) if (t.id === taskId) return t;
  return null;
}

function renderSidebar() {
  const container = document.getElementById('sidebar-weeks');
  let html = '';
  PHASES.forEach(ph => {
    html += `<div class="phase-group"><div class="phase-label" style="color:${ph.color}">${ph.name}</div>`;
    ph.weeks.forEach(wid => {
      const week = WEEKS.find(w => w.id === wid);
      const prog = weekProgress(wid);
      const active = wid === currentWeek ? 'active' : '';
      const dotColor = prog.pct === 100 ? ph.color : prog.pct > 0 ? ph.color + '66' : '';
      html += `<div class="week-item ${active}" onclick="goWeek(${wid})">
        <span class="week-num">W${wid}</span>
        <span class="week-dot" style="${dotColor ? 'background:'+dotColor : ''}"></span>
        <span class="week-name">${week.title}</span>
        <span class="week-pct">${prog.pct}%</span>
      </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
  // scroll active into view
  const activeEl = container.querySelector('.week-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function renderWeek(wid) {
  const week = WEEKS.find(w => w.id === wid);

  const prog = weekProgress(wid);

  let html = `<div class="week-header">
    <div class="week-header-top">
      <div class="wh-left">
        <h1>Week ${wid} — ${week.title}</h1>
        <p>${week.desc}</p>
      </div>
      <span class="phase-badge" style="background:${phase.light};color:${phase.dark}">${phase.name}</span>
    </div>
    <div class="week-prog-row">
      <div class="week-prog-bar"><div class="week-prog-fill" id="wpf" style="width:${prog.pct}%;background:${phase.color}"></div></div>
      <span class="week-prog-label">${prog.done}/${prog.total} tasks (${prog.pct}%)</span>
      <button class="clear-week-btn" onclick="clearWeek(${wid})">Reset week</button>
    </div>
  </div>`;

  week.sections.forEach(sec => {
    const secDone = sec.tasks.filter(t => getChecked(t.id)).length;

    html += `<div class="section">
      <div class="section-head" onclick="toggleSection('sb-${sec.id}',this)">

      </div>
      <div class="section-body" id="sb-${sec.id}">`;

    sec.tasks.forEach(task => {
      const checked = getChecked(task.id);
      const hasRes = !!TASK_RESOURCES[task.id];
      html += `<div class="task-item ${checked ? 'checked' : ''}" id="ti-${task.id}">
        <div class="task-cb ${checked ? 'checked' : ''}" id="cb-${task.id}" onclick="toggleTask('${task.id}')"></div>
        <div class="task-content" onclick="toggleTask('${task.id}')">
          <div class="task-title">${task.title}</div>
          ${task.desc ? `<div class="task-desc">${task.desc}</div>` : ''}
        </div>
        <button class="task-resource-btn" onclick="openModal('${task.id}')" title="${hasRes ? 'View resources & exercises' : 'View tips'}">
          ${SVG_BOOK}
        </button>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `<div class="week-nav">
    <button class="nav-btn" onclick="goWeek(${wid-1})" ${wid===1?'disabled':''}>← Week ${wid-1}</button>
    <button class="nav-btn primary" onclick="goWeek(${wid+1})" ${wid===16?'disabled':''}>Week ${wid+1} →</button>
  </div>`;

  document.getElementById('week-content').innerHTML = html;
}

function toggleSection(bodyId, header) {
  const body = document.getElementById(bodyId);
  const chevron = header.querySelector('.section-chevron');
  body.classList.toggle('collapsed');
  chevron.classList.toggle('open', !body.classList.contains('collapsed'));
}

function toggleTask(taskId) {
  const current = getChecked(taskId);
  setChecked(taskId, !current);
  const item = document.getElementById('ti-' + taskId);
  const cb = document.getElementById('cb-' + taskId);
  if (item) item.classList.toggle('checked', !current);
  if (cb) cb.classList.toggle('checked', !current);
  updateWeekProgress();
  updateStats();
  renderSidebar();
}

function updateWeekProgress() {
  const prog = weekProgress(currentWeek);
  const wpf = document.getElementById('wpf');
  if (wpf) { wpf.style.width = prog.pct + '%'; wpf.style.background = getPhaseForWeek(currentWeek).color; }
  document.querySelectorAll('.week-prog-label').forEach(l => l.textContent = `${prog.done}/${prog.total} tasks (${prog.pct}%)`);
  WEEKS.find(w => w.id === currentWeek).sections.forEach(sec => {
    const secDone = sec.tasks.filter(t => getChecked(t.id)).length;
    const el = document.getElementById('sm-' + sec.id);
    if (el) el.textContent = `${secDone}/${sec.tasks.length}`;
  });
}

function clearWeek(wid) {
  if (!confirm('Reset all tasks for Week ' + wid + '?')) return;
  WEEKS.find(w => w.id === wid).sections.forEach(sec => sec.tasks.forEach(t => setChecked(t.id, false)));
  renderWeek(wid); updateStats(); renderSidebar();
  showToast('Week ' + wid + ' reset.');
}

function goWeek(wid) {
  if (wid < 1 || wid > 16) return;
  currentWeek = wid;
  renderWeek(wid); updateStats(); renderSidebar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
applyTheme();
renderSidebar();
renderWeek(1);
updateStats();
</script>
</body>
